x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  vpn:
    image: qmcgaw/gluetun:v3
    cap_add: [NET_ADMIN]
    devices: [/dev/net/tun:/dev/net/tun]
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${PROTON_WG_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${PROTON_WG_ADDRESSES:-10.2.0.2/32}
      - SERVER_COUNTRIES=${PROTON_VPN_COUNTRIES:-United States,Canada,Switzerland,Netherlands}
      - HTTPPROXY=on
      - HTTPPROXY_LISTENING_ADDRESS=:8888
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
    expose: ["8888", "8000"]
    restart: unless-stopped
    logging: *default-logging
    networks:
      - mailnet
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/v1/publicip/ip"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  cortex:
    build:
      context: .
      args:
        - INSTALL_DEV=1
    restart: unless-stopped
    mem_limit: 512m
    env_file:
      - ./.env
    volumes:
      - ./local:/app/local
      - ./local/command_history:/home/app/.bash_history
    depends_on:
      cortex_bridge:
        condition: service_healthy
    logging: *default-logging
    networks:
      - mailnet

  cortex_bridge:
    image: ghcr.io/videocurio/proton-mail-bridge@sha256:d44f6b12650c6b0f9e0aefee192d65c6e46d0a22bd5ec189e8624812fd139c8b
    restart: unless-stopped
    mem_limit: 512m
    volumes:
      - cortex_bridge-data:/root   # persists the Bridge account/tokens
    expose:
      - "25"                # SMTP (internal)
      - "143"               # IMAP (internal)
    logging: *default-logging
    networks:
      - mailnet
    healthcheck:
      test: ["CMD-SHELL", "socat - TCP:127.0.0.1:1143,connect-timeout=2 </dev/null >/dev/null 2>&1"]
      interval: 4s
      timeout: 3s
      retries: 5
      start_period: 5s

networks:
  mailnet:

volumes:
  cortex_bridge-data:
